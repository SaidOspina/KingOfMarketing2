<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión — Creations By Maydol</title>
    <link rel="icon" type="image/x-icon" href="img/logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-screen">
        <div class="login-container">
            <div class="login-card">
                <img src="img/logo.png" alt="Logo" class="login-logo">
                <h1 class="login-title">Panel de Administración</h1>
                <p class="login-subtitle">Creations By Maydol</p>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">
                        <span>Iniciar Sesión</span>
                    </button>
                    <div class="login-hint">
                        Usuario: <strong>admin</strong> | Contraseña: <strong>maydol2026</strong>
                    </div>
                </form>
                <div class="login-footer">
                    <a href="index.html" class="back-link">
                        <span>&larr;</span>
                        <span>Volver al sitio web</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
